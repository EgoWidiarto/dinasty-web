<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SCAN DINASTI - Pemindai QR untuk materi sejarah" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>SCAN DINASTI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-dark text-white scanner-page">
    <div class="container-fluid min-vh-100 d-flex flex-column px-0 scanner-container">
      <div class="header-section text-center py-4 px-3">
        <img src="assets/component/logo-dinasty.png" alt="Logo Dinasti" class="logo mb-2" />
        <h1 class="title-sub mb-2">SCAN DINASTI</h1>
      </div>

      <main class="flex-grow-1 d-flex flex-column px-3 pb-3 scanner-main-wrap">
        <p id="statusMessage" class="text-center mb-2">Siap memindai QR mini. Tekan "Mulai Scan".</p>

        <section class="scanner-card mb-3">
          <div class="scanner-video-wrap">
            <video id="qrVideo" class="scanner-video" playsinline muted></video>
            <div id="scannerOverlay" class="scanner-overlay">
              <div class="scanner-guide-box"></div>
            </div>
          </div>

          <div class="scanner-controls">
            <button id="startScanBtn" class="btn btn-success scanner-start-btn" type="button">Mulai Scan</button>
            <button id="stopScanBtn" class="btn btn-danger scanner-stop-btn" type="button" disabled>Stop</button>
            <button id="toggleTorchBtn" class="btn btn-warning scanner-torch-btn" type="button" disabled>Senter</button>
          </div>

          <div class="zoom-controls mt-2">
            <button id="zoomOutBtn" class="btn btn-outline-light" type="button" disabled aria-label="Zoom out">−</button>
            <input id="zoomSlider" type="range" min="1" max="3" step="0.1" value="1" disabled aria-label="Kontrol zoom" />
            <button id="zoomInBtn" class="btn btn-outline-light" type="button" disabled aria-label="Zoom in">+</button>
            <span id="zoomLevelDisplay" class="text-warning">100%</span>
          </div>
        </section>

        <section id="scanResultCard" class="alert alert-light d-none scanner-result-card" role="status" aria-live="polite">
          <h5 class="alert-heading mb-2">Hasil QR</h5>
          <p id="scanResultText" class="mb-2 scanner-result-text"></p>
          <p id="scanResultMeta" class="mb-2 small text-secondary"></p>
          <div class="d-flex gap-2 flex-wrap">
            <button id="copyResultBtn" class="btn btn-warning btn-sm" type="button">Salin Isi QR</button>
            <button id="openResultBtn" class="btn btn-primary btn-sm" type="button">Buka Link</button>
          </div>
        </section>
      </main>

      <button class="scanner-back-btn" id="backBtn" aria-label="Kembali ke halaman utama">
        <img src="assets/component/back_btn.png" alt="Button Back" />
      </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/libs/qr-scanner.umd.min.js?v=20260405-1"></script>
    <script src="js/scanner.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
