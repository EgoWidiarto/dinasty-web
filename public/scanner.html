<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SCAN DINASTI - Pemindai QR untuk materi sejarah" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>SCAN DINASTI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-dark text-white scanner-page">
    <div class="container-fluid min-vh-100 d-flex flex-column px-0 scanner-container">
      <div class="header-section text-center py-4 px-3">
        <img src="assets/component/logo-dinasty.png" alt="Logo Dinasti" class="logo mb-2" />
        <h1 class="title-sub mb-2">SCAN DINASTI</h1>
      </div>

      <main class="flex-grow-1 d-flex flex-column px-3 pb-3 scanner-main-wrap">
        <p id="statusMessage" class="text-center mb-2">Pilih mode scan.</p>
        <p id="cameraInfoMessage" class="text-center small text-warning mb-2"></p>

        <section class="scanner-card mb-3">
          <div class="d-grid gap-2 mb-3 scanner-mode-switch">
            <button id="modeLiveBtn" class="btn btn-outline-light" type="button">Scan Biasa (Kamera Live)</button>
            <button id="modeNativeBtn" class="btn btn-primary" type="button">Scan Native Camera (Foto)</button>
          </div>

          <div id="liveModePanel" class="d-none">
            <div class="scanner-video-wrap mb-2">
              <video id="qrVideo" class="scanner-video" playsinline muted></video>
            </div>
            <div class="d-grid gap-2">
              <button id="startLiveScanBtn" class="btn btn-success" type="button">Mulai Scan Live</button>
              <button id="stopLiveScanBtn" class="btn btn-danger" type="button" disabled>Stop Scan Live</button>
            </div>
          </div>

          <div id="nativeModePanel">
            <button id="capturePhotoBtn" class="btn btn-primary btn-lg w-100" type="button">Ambil Foto QR</button>
            <input id="nativePhotoInput" type="file" accept="image/*" capture="environment" class="d-none" />
          </div>
        </section>
      </main>

      <button class="scanner-back-btn" id="backBtn" aria-label="Kembali ke halaman utama">
        <img src="assets/component/back_btn.png" alt="Button Back" />
      </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/libs/qr-scanner.umd.min.js?v=20260405-8"></script>
    <script src="js/scanner.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
