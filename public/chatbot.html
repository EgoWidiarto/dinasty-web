<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ASK DINASTY" />
    <meta name="theme-color" content="#1a1a2e" />
    <!-- Disable cache untuk chatbot page -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>ASK DINASTY</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Turtles dan Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-dark text-white">
    <div class="container-fluid vh-100 d-flex flex-column px-0">
      <!-- Header Section -->
      <div class="header-section text-center py-5 px-3">
        <img src="assets/component/logo-dinasty.png" alt="Logo Dinasty" class="logo mb-3" />
        <h1 class="title-sub mb-4">YUK CARI TAU!</h1>
        <div class="header-divider"></div>
      </div>

      <!-- Chat + Input on Background Card -->
      <div class="flex-grow-1 d-flex align-items-center justify-content-center p-3">
        <div class="chatbot-bg-card">
          <div class="chatbot-content-wrap">
            <!-- Chat Area -->
            <div class="overflow-auto p-3 mb-3" id="chatContainer" style="display: flex; flex-direction: column; gap: 1rem">
              <div class="text-center text-secondary mt-5 chatbot-welcome-note"> </div>
            </div>

            <!-- Input Area -->
            <div class="p-3 border-top border-secondary rounded-4 chatbot-input-panel">
              <div class="input-group input-group-lg">
                <input type="text" class="form-control bg-secondary text-white border-0 rounded-start-4 chatbot-message-input" id="messageInput" placeholder="Tanya tentang sejarah Indonesia..." />
                <button class="btn btn-primary btn-lg rounded-end-4 fw-bold" id="sendBtn" style="padding: 0 2rem"> Kirim </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <button class="chatbot-back-btn" id="backBtn">
        <img src="assets/component/back_btn.png" alt="Button Back" />
      </button>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chatbot Script -->
    <script src="js/chatbot.js"></script>
  </body>
</html>
